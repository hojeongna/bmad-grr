# grr customization for bmad-create-story
# Source: bmad-grr (https://github.com/hojeongna/bmad-grr)
# Effect: grr-spec-validate gate on single-story completion. The full four-rubric
#         set runs — same shape as the quick-story step-04b gate.
#
# Requires:
#   - bmad-grr installed
#   - This file copied to {project-root}/_bmad/custom/ via /bmad-grr-customize

[workflow]

activation_steps_prepend = [
  """
  ### Pre-flight: Verify grr-spec-validate is installed

  Check ~/.claude/skills/grr-spec-validate/SKILL.md exists. HALT if missing
  (see bmad-create-prd customization for install instructions).

  Ask once (skip if known from a prior workflow in this session):

    "Story 검증을 위해 코드베이스 컨벤션 체크리스트가 있다면 절대 경로를 알려주세요.
     없으면 `skip`."

  Save as $CHECKLIST_PATH (or null if skip).

  Then determine greenfield vs brownfield (skip if known this session):

    "이 스토리는 기존 코드를 확장/변경하나요(Brownfield) 아니면 새 코드인가요(Greenfield)?
      [B] Brownfield  [G] Greenfield
     B면 건드릴 영역(파일/폴더/feature)도 알려주세요."

  Save as $STORY_MODE (B or G) and $STORY_AREAS (string or empty). In
  brownfield mode the validator (on_complete) re-reads the actual files
  this story names and confirms the story's claims about them are true.
  """,
]

persistent_facts = [
  "Every acceptance criterion drafted in this story must be measurable: numbers, time bounds, or explicit Pass/Fail conditions. If an AC uses vague qualifiers, pause and ask the user for a measurable form before recording.",
  "Tasks must be atomic, dependency-ordered, and reference at least one AC. A task that mixes domains ('build UI + write tests + deploy') is too broad — decompose.",
  "Edge cases and failure paths must be explicit in the AC list or in a dedicated section. A story with only the happy path will fail validation at the three-stage detail rubric.",
  "If the project has a codebase-convention checklist (asked for in pre-flight), planned implementation in this story must not contradict its rules. Check tasks against the checklist as they are drafted.",
  "This is a STORY — focus is on SPECIFIC related code, not overall patterns (those are the architecture's job). Code reads here target the exact files this story will touch and 1-2 sibling features with the closest shape, not the whole codebase.",
  "STAGE — Acceptance Criteria: USE Glob/Grep to find at least one sibling feature with the closest shape to this story (same domain, same CRUD/UI/flow type). Read that sibling's tests or AC docs to align AC style and edge-case coverage. Cite the sibling. ACs drafted without referencing a sibling pattern drift from project conventions.",
  "STAGE — Tasks: each Task must cite the SPECIFIC file(s) it will create or modify. USE Glob to discover the actual paths in the story's blast radius. A task that says 'Implement X' or 'Update Y' without naming files is non-actionable — break it down until each task has a concrete file mapping. Tasks introducing new files must say where the new file lives (folder + filename).",
  "STAGE — Dev Notes / Implementation guidance: USE Read on the most central files in the blast radius — the file being modified + its direct dependents (1 hop). Capture the existing imports, hook usage, and inline patterns so the dev-story agent does not re-discover them. Cite paths and line ranges. Dev Notes drafted without reading the actual neighbor files are flagged 'speculative — verify before dev-story consumes this'.",
  "file:{project-root}/**/project-context.md",
]

on_complete = """
### Post-flight: Dispatch grr-spec-validate on the completed story

Get the final story file path (typically under {implementation_artifacts}/).
Dispatch a fresh sub-agent:

  Task prompt:
    Load and follow the grr-spec-validate skill.

    Inputs:
    - artifact_path: <absolute story path>
    - rubrics: ambiguity, ac-measurability, three-stage, checklist
               # if $STORY_MODE == "B", ALSO add: brownfield-grounding
    - checklist_path: <$CHECKLIST_PATH if set, otherwise omit>
    - project_root: <absolute project root — include ONLY if $STORY_MODE == "B">
    - brownfield_areas: <$STORY_AREAS — include ONLY if $STORY_MODE == "B">
    - reference_paths: <PRD path if present under {implementation_artifacts}/,
                        otherwise omit; architecture path is NOT included>

    Constraints:
    - Fresh context, no access to main conversation.
    - Artifact-only rubrics read the artifact alone; brownfield-grounding
      may Read/Glob/Grep project_root to verify the story's file-level
      claims (the files each Task names, "no existing X" assertions).
    - Read-only — never edit source. Return JSON only.

Parse JSON. Branch on `verdict`:

- "PROCEED": tell the user "Story 검증 통과. dev-story로 진행 가능." End the workflow.

- "REVISE": present `revision_pointers`. Offer:
    [R] Apply pointers in this session (re-draft affected sections, re-dispatch).
    [E] Inline edit — user edits the file directly, then we re-dispatch.
    [O] Override: append "Validator Override" with the JSON to the story file,
        end the workflow.

Re-dispatch is idempotent (fresh sub-agent every time, no shared state).
"""
