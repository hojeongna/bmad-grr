# grr customization for bmad-create-epics-and-stories
# Source: bmad-grr (https://github.com/hojeongna/bmad-grr)
# Effect: grr-spec-validate dispatched IN PARALLEL — one sub-agent per story —
#         after the epics-and-stories doc is produced. Each story is validated
#         independently. The aggregated verdict gates downstream consumption.
#
# Requires:
#   - bmad-grr installed
#   - This file copied to {project-root}/_bmad/custom/ via /bmad-grr-customize

[workflow]

activation_steps_prepend = [
  """
  ### Pre-flight: Verify grr-spec-validate is installed

  Check ~/.claude/skills/grr-spec-validate/SKILL.md exists. HALT if missing
  (see bmad-create-prd customization for install instructions).

  Ask once (skip if already known in this session):

    "Story 검증을 위해 코드베이스 컨벤션 체크리스트가 있다면 절대 경로를 알려주세요.
     없으면 `skip`."

  Save as $CHECKLIST_PATH (or null if skip).

  Then determine greenfield vs brownfield (skip if already known this session):

    "이 에픽들은 기존 코드베이스를 확장/변경하나요(Brownfield) 아니면 새 프로젝트인가요(Greenfield)?
      [B] Brownfield  [G] Greenfield"

  Save as $EPIC_MODE (B or G). In brownfield mode, per-story validation
  (on_complete) additionally re-verifies each story's claims about existing
  code against real source.
  """,
  """
  ### Pre-planning: Module-boundary code survey — MANDATORY in brownfield

  Run ONLY if $EPIC_MODE == "B". This is a HARD GATE: do NOT partition any
  epics or draft any stories until this survey has returned. Epic
  partitioning that does not reflect the real module structure produces
  stories with wrong ownership and overlapping scope.

  Dispatch a Task / Agent:

    Survey the existing module / feature structure of the codebase at
    {project-root}. The epic planner will partition work along these real
    boundaries, so map them accurately.

    Constraints:
    - Read-only. No access to the main conversation.
    - Use Glob to map structure (src/features/*/, src/modules/*/,
      packages/*/, app/*/ — adapt to the project's real layout). Read each
      module's index/entry + one representative file to understand its
      responsibility. Do NOT read the whole tree — one representative read
      per module is enough.
    - Cap at ~15 modules; if more, list the rest by name only.

    For each module capture:
    - path (the folder)
    - responsibility (one line: what this module owns)
    - public surface (what it exports / how others depend on it)
    - rough size (small / medium / large by file count)

    Output: a single fenced JSON block:

    {
      "modules": [
        { "path": "src/features/scheduler", "responsibility": "manager weekly/daily scheduling", "public_surface": "WeeklyView, useWeeklyPlanQuery", "size": "large" }
      ],
      "notes": "<≤ 200 char summary of how the codebase is partitioned today>"
    }

  Write this to {project-root}/_bmad-output/_grr-analysis/epic-module-survey.md
  (create the folder if needed). Remember the path as $MODULE_SURVEY.

  Use it as the partition reference: each epic should map to one (or a small
  set of) real modules; each story anchors to a module from this list. An
  epic boundary that does not correspond to anything in the survey needs an
  explicit rationale.
  """,
]

persistent_facts = [
  "Each story drafted must have measurable ACs. Vague ACs across multiple stories compound — drift becomes invisible at the epic level. Apply the same anti-vagueness guidance as bmad-create-story: numbers, observable outcomes, no soft modifiers.",
  "Stories within an epic must not have overlapping scope. Before recording a new story, cross-check the in-progress epic for stories that already cover the same surface. If overlap exists, either merge or refine the boundary.",
  "Story task lists must avoid 'implement feature' as a single task. Decompose into atomic tasks with explicit input/output and dependency markers.",
  "This is EPIC-LEVEL planning — focus on overall PATTERNS and module boundaries, not specific files. The granular file-level reads happen later in bmad-create-story for each story; here we only need enough structure to partition coherently.",
  "STAGE — Epic boundary definition: USE Glob to map the existing module / feature folder structure (e.g., src/features/*/, src/modules/*/, packages/*/). Each epic should align to a recognizable module boundary unless the user explicitly wants to cut across them. Cite the boundary patterns observed. Epics that cut across without justification produce stories with unclear ownership.",
  "STAGE — Story partitioning: for each story being created, identify its CENTRAL module (the one file or folder the story is most-anchored on). Different stories should anchor to different modules, OR to clearly different surfaces within a module. Two stories anchored to the same single file usually mean the file is too large or the stories overlap — flag this.",
  "STAGE — Cross-story dependencies: when one story depends on another (story B needs story A's output), explicitly record it. USE Grep to verify the dependency direction is one-way at the code level (no circular module imports between the anchor files of A and B). Bi-directional dependencies are an architecture smell — surface for the user to resolve before locking the epic.",
  "file:{project-root}/**/project-context.md",
]

on_complete = """
### Post-flight: Parallel grr-spec-validate dispatch (one sub-agent per story)

Locate the produced epics-and-stories document (typically under
{implementation_artifacts}/) and extract every story key + corresponding story
section / file path. Stories may be sub-documents under
{implementation_artifacts}/stories/ — discover them.

For each story (concurrently):

  Task prompt (one per story):
    Load and follow the grr-spec-validate skill.

    Inputs:
    - artifact_path: <absolute path to this single story>
    - rubrics: ambiguity, ac-measurability, three-stage, checklist
               # if $EPIC_MODE == "B", ALSO add: brownfield-grounding
    - checklist_path: <$CHECKLIST_PATH if set, otherwise omit>
    - project_root: <absolute project root — include ONLY if $EPIC_MODE == "B">
    - brownfield_areas: <this story's target module/files — include ONLY if $EPIC_MODE == "B">
    - reference_paths: <comma-separated: $MODULE_SURVEY if written + PRD path if
                        present + architecture path if present; otherwise omit>

    Constraints:
    - Fresh context, no access to main conversation.
    - Artifact-only rubrics read the artifact alone; brownfield-grounding
      may Read/Glob/Grep project_root to verify the story's claims about
      existing code (e.g. files it says it will touch, "no existing X").
    - Read-only — never edit source. Return single JSON block per SKILL.md schema.

Dispatch all sub-agents at once (parallel dispatch). When all return, aggregate:

- Worst verdict across stories → overall verdict (any REVISE → epic REVISE)
- Concatenate revision_pointers per story, prefix with story key
- Build a summary table: story_key | verdict | weakest_aspect

Present the summary to the user in {communication_language}, sorted REVISE first.

Branch on aggregate verdict:

- "PROCEED": tell the user "전체 스토리 검증 통과." End the workflow.

- "REVISE": offer per-story choice:
    [R <story_key>] Revise the named story (re-draft, re-dispatch its validator).
    [R *] Revise all REVISE stories in a single follow-up pass.
    [O <story_key>] Override the named story (append override note to its file).
    [O *] Override all REVISE stories.

After any revision, re-dispatch the affected stories' validators — idempotent.
"""
