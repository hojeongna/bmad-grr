# grr customization for bmad-create-prd
# Source: bmad-grr (https://github.com/hojeongna/bmad-grr)
# Effect: grr-spec-validate gate on PRD completion + inline anti-vagueness guidance.
#
# Requires:
#   - bmad-grr installed (provides ~/.claude/skills/grr-spec-validate/)
#   - This file copied to {project-root}/_bmad/custom/ via /bmad-grr-customize
#
# Override layers (per BMad convention):
#   - This file: team/repo override (committed)
#   - {project-root}/_bmad/custom/bmad-create-prd.user.toml: personal (gitignored)

[workflow]

activation_steps_prepend = [
  """
  ### Pre-flight: Verify grr-spec-validate is installed

  Check that ~/.claude/skills/grr-spec-validate/SKILL.md exists. If missing, HALT
  this workflow and tell the user:

    The grr-spec-validate skill is required by this workflow's customization but
    is not installed. Install bmad-grr first:

        git clone https://github.com/hojeongna/bmad-grr.git
        cd bmad-grr && bash install.sh

    Then re-run /bmad-create-prd.

  Ask the user once, in {communication_language}:

    "PRD 검증을 위해 프로젝트 코드베이스 컨벤션 체크리스트가 있다면 절대 경로를 알려주세요.
     없으면 `skip`이라고 입력하시면 됩니다."

  Save the response as $CHECKLIST_PATH (or null if skip). It is used in on_complete.

  Do NOT proceed to Stage 1 until this pre-flight is complete.
  """,
  """
  ### Pre-flight: Brownfield detection — must read related files

  Ask the user once, in {communication_language}:

    "이 PRD는 다음 중 어디에 해당하나요?
      [G] Greenfield — 완전 새로운 기능/제품 (기존 코드 없음)
      [B] Brownfield — 기존 코드를 확장/변경하는 작업

     B면 어느 영역(파일 경로 / 폴더 / feature 이름)에 영향이 가는지도 같이 알려주세요.
     예: 'src/features/scheduler/, hooks/queries/daily-view/'"

  Save the response as $PRD_MODE (G or B) and $BROWNFIELD_AREAS (string or empty).

  If $PRD_MODE == "G", continue without further pre-flight.

  If $PRD_MODE == "B", pre-flight is NOT complete until the brownfield context
  survey has run. Dispatch a Task / Agent:

    Survey the brownfield areas the user listed and return a structured
    summary. The PRD author (main session) will consume this as the ground
    truth for "what exists today" — the PRD must be written against this
    reality, not invented assumptions.

    Inputs:
    - areas: $BROWNFIELD_AREAS  (file paths, folders, or feature names —
      treat as Glob/Grep seeds)

    Constraints:
    - Read-only. You do NOT have access to the main conversation.
    - Use Glob/Grep to discover, Read to confirm. Do NOT skim — actually
      open the top files in each area.
    - Cap at ~10 files total; pick the most central ones (entry points,
      route files, the primary hook for the feature, the largest component).

    For each file you actually read, capture:
    - path
    - role (one line: what this file does for the user)
    - current capabilities (what the user can already do here)
    - current limitations / friction (what's missing, awkward, or blocking)
    - direct dependencies (what else this file touches)

    Output: a single fenced JSON block:

    {
      "areas_surveyed": ["<area1>", "<area2>"],
      "files": [
        {
          "path": "src/features/scheduler/WeeklyView.tsx",
          "role": "weekly schedule grid for managers",
          "capabilities": ["drag-and-drop tasks", "filter by student"],
          "limitations": ["no bulk operations", "loads all weeks at once"],
          "dependencies": ["useWeeklyPlanQuery", "BottomSheet", "shared/Button"]
        }
      ],
      "open_questions": ["<question the PRD author must answer with the user>"]
    }

  Carry this JSON forward. EVERY PRD section that touches a surveyed area
  must cite the relevant file paths and current behavior. PRD claims like
  "currently we have no way to X" require evidence — if the survey did not
  surface X, the PRD must record that as an open_question for the user to
  resolve before drafting that claim.

  Do NOT proceed to Stage 1 until this survey is complete (for brownfield)
  or skipped (for greenfield).
  """,
]

persistent_facts = [
  "Throughout this workflow, every acceptance criterion drafted must be measurable: contain numbers, time bounds, or explicit Pass/Fail conditions. If an AC uses vague qualifiers ('fast', 'better', 'soon', 'easy', 'good', 'maybe', 'should', 'roughly', 'around', '적절히', '충분히', '친절하게'), pause and ask the user for a measurable form before recording it.",
  "When the user's answer to a stage question contains vague qualifiers, ask once for clarification with concrete examples ('what counts as fast — give a number?') before recording. Do not interrupt for every soft modifier — apply judgment; intervene only when the vagueness blocks measurability.",
  "Goals, scope, and NFR sections must each individually be specific. A section that reads 'improve performance' or 'better UX' is incomplete — drill down to numbers, observable behaviors, or explicit out-of-scope statements.",
  "In brownfield mode (per pre-flight survey): any PRD claim about CURRENT STATE ('users can X', 'system does Y', 'currently no way to Z') must cite a specific file path from the survey output. A claim without a file-path citation is flagged — either provide the citation or convert the claim to an explicit open_question for the user to answer.",
  "STAGE — Functional Requirements: before drafting each FR that touches existing code, USE the Read/Glob/Grep tools (or dispatch a sub-agent) to actually open at least 2-3 related files. Cite each file path inline next to the FR ('see src/features/scheduler/WeeklyView.tsx:42-90 for current behavior'). An FR drafted without file-path citations in brownfield mode is incomplete and must be revised before recording.",
  "STAGE — Non-Functional Requirements: for any NFR that references an existing system (current latency, throughput, capacity), USE the Read tool on the existing perf-sensitive path(s) and Grep for related instrumentation/metrics code. Cite the file paths. NFRs without grounded baseline citations from real code are flagged as 'assumption — verify or convert to a measurement task'.",
  "STAGE — Risks / Dependencies: USE Grep to find cross-module integration points around the brownfield areas (imports, shared utilities, event subscriptions, shared providers). Each risk entry must cite at least one file demonstrating the integration. Risks without code evidence are flagged 'speculative — drop or substantiate'.",
  "STAGE — Out of Scope: each 'out of scope' bullet must be backed by NEGATIVE evidence — a Grep that returned nothing for the item, OR a file path showing the user-facing surface where the item is conspicuously absent. Out-of-scope claims without verification are recorded as 'unverified — user must confirm before finalizing'.",
  "file:{project-root}/**/project-context.md",
]

on_complete = """
### Post-flight: Dispatch grr-spec-validate on the completed PRD

Get the final PRD path produced by this workflow (typically under
{implementation_artifacts}/prd*.md). Then dispatch a fresh sub-agent (Task /
Agent tool) using the invocation pattern at
~/.claude/skills/grr-spec-validate/invocation-template.md:

  Task prompt:
    Load and follow the grr-spec-validate skill.

    Inputs:
    - artifact_path: <absolute PRD path>
    - rubrics: ambiguity, ac-measurability, three-stage, checklist
    - checklist_path: <$CHECKLIST_PATH if set, otherwise omit this line>
    - reference_paths: (none — PRD is itself the top-level reference)

    Constraints:
    - You see ONLY the artifact, the rubric files in this skill, and the
      checklist (if provided). You do NOT have access to the main conversation.
    - Do NOT modify the artifact. Return JSON only.

    Return: a single fenced JSON block matching the schema in SKILL.md.

Parse the JSON. Branch on `verdict`:

- "PROCEED": tell the user "PRD 검증 통과. 다운스트림(Architecture / Epics)으로 진행 가능."
  End the workflow normally.

- "REVISE": present `revision_pointers` verbatim. Halt and offer:
    [R] Apply pointers in this session (re-draft affected sections, then
        re-dispatch the validator — fresh sub-agent each time, idempotent).
    [O] Override: accept the current PRD as final. Append a "Validator
        Override" section to the PRD containing the full JSON for audit,
        then end the workflow.

The validator is read-only and side-effect-free. Re-dispatch as many times
as needed during [R].
"""
