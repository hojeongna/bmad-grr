# grr customization for bmad-create-architecture
# Source: bmad-grr (https://github.com/hojeongna/bmad-grr)
# Effect: grr-spec-validate gate on Architecture doc completion. Emphasizes
#         concept↔solution alignment and detail-stage numeric thresholds.
#
# Requires:
#   - bmad-grr installed (provides ~/.claude/skills/grr-spec-validate/)
#   - This file copied to {project-root}/_bmad/custom/ via /bmad-grr-customize
#
# Note: AC measurability is NOT applied to architecture docs (they have no ACs).
#       Checklist is optional — codebase conventions usually apply to story-time,
#       not architecture-time.

[workflow]

activation_steps_prepend = [
  """
  ### Pre-flight: Verify grr-spec-validate is installed

  Check ~/.claude/skills/grr-spec-validate/SKILL.md exists. If missing, HALT and
  tell the user to install bmad-grr first (see the bmad-create-prd customization
  for the install command).

  Ask the user once (skip if already known from a prior workflow in this session):

    "Architecture 검증을 위해 코드베이스 컨벤션 체크리스트가 있다면 절대 경로를 알려주세요.
     아키텍처 문서엔 보통 적용 안 되니, `skip` 도 무방해요."

  Save as $CHECKLIST_PATH (or null if skip).
  """,
]

activation_steps_append = [
  """
  ### Pre-design: Codebase reuse survey (fresh sub-agent)

  Before drafting any architecture, dispatch a sub-agent that surveys the
  existing codebase for reusable pieces. The architect (this session) MUST
  consider these before introducing new patterns.

  Dispatch a Task / Agent with this prompt:

    Survey the codebase at {project-root}. Return a structured JSON block
    listing the reuse candidates in three categories.

    1. Layout / Shell — page-level layouts, app shells, navigation containers,
       providers, route wrappers, modal hosts. Look in src/layouts/, src/shells/,
       src/app/, src/providers/, or wherever the project organizes these.

    2. UI Primitives — basic shared components (Button, Input, Modal, Toast,
       BottomSheet, etc.). Look in src/components/shared/, packages/shared/,
       @<scope>/shared, or wherever the project keeps shared primitives.

    3. Hook & Query patterns — custom hook conventions and React Query
       (or equivalent) usage patterns. Look in src/hooks/, src/hooks/queries/,
       and inline-defined hooks inside views. Note any consistent patterns:
       useQuery key shapes, mutation onMutate/onError shapes, naming
       conventions, where data transformation lives (select vs queryFn).

    Constraints:
    - Read-only. Do not modify any file.
    - You do NOT have access to the main conversation.
    - Use Glob and Grep to discover; Read only the files needed to confirm.
    - Cap the output: list at most ~15 most-relevant items per category with
      one-line purpose. Skip irrelevant noise (build artifacts, tests).

    Output: a single fenced JSON block:

    {
      "layout_shell": [
        { "path": "src/layouts/AppShell.tsx", "purpose": "outer chrome with nav" },
        ...
      ],
      "ui_primitives": [
        { "path": "@nexcube/shared/Button", "purpose": "shared button primitive" },
        ...
      ],
      "hook_query_patterns": [
        { "pattern": "queryKey shape", "example": "['daily-view', studentId]", "where": "src/hooks/queries/daily-view/useDailyViewQuery.ts" },
        { "pattern": "mutation with onMutate/onError optimistic", "where": "src/hooks/queries/.../useUpdateMutation.ts" },
        ...
      ],
      "notes": "<≤ 200 char summary of the dominant style>"
    }

  Carry this survey JSON into the architecture drafting as the primary reuse
  reference. Every architectural decision that introduces a new primitive /
  layout / hook pattern must explicitly justify why an existing one would not
  do (cite the survey item rejected and the technical reason).
  """,
]

persistent_facts = [
  "This is ARCHITECTURE — the OUTPUT speaks in overall patterns, conventions, and structural decisions. BUT to design well, you must READ ACTUAL CODE: patterns are derived from real files, not invented or remembered. USE Read/Glob/Grep on existing modules to find the dominant style, and ground every architectural decision in observed reality (cite the files you read even when the output is a pattern statement). Migration/Rollout is the stage where the design maps back to specific file changes — that step names exact files. All other stages: read code, write patterns.",
  "Non-functional requirements and quality attributes (latency, throughput, availability, capacity) must have numeric thresholds, not adjectives. If the user says 'fast' or 'highly available' without a number, ask for one ('p95 latency target? availability SLO?') before recording.",
  "Trade-off decisions in this architecture must each be explicit: state the alternatives considered and the reason for the chosen path. A bare 'we will use X' without 'rejected Y because Z' is incomplete.",
  "Before introducing a new UI primitive (Button, Input, Modal, etc.), cross-check the codebase reuse survey from pre-design. If an existing primitive exists in shared/, reuse it; introducing a duplicate requires an explicit rejection rationale recorded in the architecture.",
  "Before introducing a new layout or shell component, cross-check the reuse survey's layout_shell list. Layouts are expensive to fork — extension via composition is the default, replacement requires explicit justification.",
  "Before defining a new hook or query pattern, cross-check the reuse survey's hook_query_patterns. Inconsistency across views (different queryKey shapes, different mutation cache strategies) is a code-review pushback magnet — drift away from the dominant style needs justification.",
  "If the architecture introduces a pattern not present in the existing codebase (greenfield section), explicitly note which existing patterns it replaces or coexists with. Cross-check {project-root}/**/project-context.md and the reuse survey output.",
  "STAGE — Component Breakdown: USE the Read/Glob tools to actually open the existing module boundary structure (Glob for src/*/index.ts, src/features/*/index.ts, src/modules/*/, packages/*/index.ts). Reference at least 3 existing boundary patterns and explain how the new components compose with — or deliberately diverge from — them. Component breakdown not grounded in real existing structure is incomplete; revise before recording.",
  "STAGE — Data Model: USE the Read tool on the existing type definitions (src/types/*.ts, src/**/types.ts, prisma/schema.prisma, packages/shared/types/*, or wherever the project keeps types — Glob to discover). Show how new types extend or compose with existing ones. New types that duplicate existing fields without justification are flagged. Cite file paths for every reused type.",
  "STAGE — API Surface: USE the Read tool on the existing API routes and hook conventions (src/api/, src/hooks/queries/, app/api/, pages/api/ — adapt to the project's actual layout). New endpoints must follow the dominant pattern observed in the reuse survey and the files read here; deviations require explicit rationale citing the rejected pattern.",
  "STAGE — Migration / Rollout: USE the Read tool on every file that will actually be changed. For each migration step, cite the exact file path(s) being modified. Steps without an affected-file mapping are flagged as 'plan-only — must specify which files change before this step is actionable'.",
  "file:{project-root}/**/project-context.md",
]

on_complete = """
### Post-flight: Dispatch grr-spec-validate on the completed Architecture doc

Get the final architecture doc path (typically under
{implementation_artifacts}/architecture*.md). Dispatch a fresh sub-agent:

  Task prompt:
    Load and follow the grr-spec-validate skill.

    Inputs:
    - artifact_path: <absolute architecture doc path>
    - rubrics: ambiguity, three-stage, checklist
        # ac-measurability omitted — architecture docs do not have ACs
    - checklist_path: <$CHECKLIST_PATH if set, otherwise omit>
    - reference_paths: <absolute PRD path if present under {implementation_artifacts}/, otherwise omit>

    Constraints:
    - Fresh context, no access to main conversation.
    - Read-only. Return single JSON block per SKILL.md schema.

Parse JSON. Branch on `verdict`:

- "PROCEED": tell the user "Architecture 검증 통과. Epic 분해 단계로 진행 가능."
  End the workflow.

- "REVISE": Architecture issues are usually structural (weakest stage = concept
  or structure means the architecture itself needs rework, not just polish).
  Present `revision_pointers` and `three_stage` scores. Offer:
    [R] Address the pointers (re-draft affected sections, re-dispatch).
    [O] Override: accept current doc as final, append a "Validator Override"
        section with the JSON for audit, end.

  When `weakest == "concept"`, recommend [R] strongly — the architecture is
  solving the wrong problem (or solving the right problem in the wrong direction).
"""
